[pytest]
# ── Discovery ───────────────────────────────────────────────────
testpaths = selenium-tests/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ──────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --timeout=60
    --html=Test Results/HTML/execution-report.html
    --self-contained-html

# ── Logging ─────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_file = Test Results/Logs/pytest.log
log_file_level = DEBUG

# ── Timeouts ────────────────────────────────────────────────────
timeout = 60
timeout_method = thread
