name: 🚀 Deploy to GitHub Pages + Selenium E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_USERNAME: Viru-6281
  REPO_NAME: spic-pdd
  BASE_URL: https://Viru-6281.github.io/spic-pdd/

jobs:
  # ══════════════════════════════════════════
  # JOB 1: Build React App
  # ══════════════════════════════════════════
  build:
    name: 🏗️ Build React Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Build React app for GitHub Pages
        working-directory: client
        env:
          VITE_BASE_PATH: /spic-pdd/
          VITE_API_BASE_URL: https://your-api-server.com/
        run: |
          # Patch vite.config.js base for GitHub Pages
          cat > vite.config.js << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          import path from 'path'

          export default defineConfig({
            plugins: [react()],
            base: '/spic-pdd/',
            resolve: {
              alias: {
                '@': path.resolve(__dirname, './src'),
              },
            },
          })
          EOF
          npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  # ══════════════════════════════════════════
  # JOB 2: Deploy to GitHub Pages
  # ══════════════════════════════════════════
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ══════════════════════════════════════════
  # JOB 3: Verify Deployment
  # ══════════════════════════════════════════
  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name != 'pull_request'
    steps:
      - name: Wait for deployment to be available
        run: |
          echo "Waiting for GitHub Pages deployment to be live..."
          sleep 45

      - name: Check deployment URL returns HTTP 200
        run: |
          URL="https://${{ env.GITHUB_USERNAME }}.github.io/${{ env.REPO_NAME }}/"
          echo "Checking: $URL"

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 15 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -eq "200" ]; then
              echo "✅ Deployment verified! Site is live."
              echo "## ✅ Deployment Verified" >> $GITHUB_STEP_SUMMARY
              echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
              echo "HTTP Status: $STATUS" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 15
          done

          echo "❌ Deployment not reachable after 10 attempts"
          echo "## ❌ Deployment Verification Failed" >> $GITHUB_STEP_SUMMARY
          exit 1

  # ══════════════════════════════════════════
  # JOB 4: Selenium E2E Tests
  # ══════════════════════════════════════════
  selenium-e2e:
    name: 🤖 Selenium E2E Tests — Live GitHub Pages
    runs-on: ubuntu-latest
    needs: verify-deployment
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium test dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Setup Chrome for headless Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' | head -1)
          echo "Chrome version: $CHROME_VERSION"
          npm install -g chromedriver

      - name: Create test results directories
        run: |
          mkdir -p "Test Results/Excel"
          mkdir -p "Test Results/HTML"
          mkdir -p "Test Results/Screenshots"
          mkdir -p "Test Results/Logs"
          mkdir -p "Test Results/Summary"

      - name: Run Selenium E2E Tests
        working-directory: selenium-tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: true
          SCREENSHOT_DIR: ../Test\ Results/Screenshots
          LOG_DIR: ../Test\ Results/Logs
        run: |
          echo "Running Selenium E2E Tests against: $BASE_URL"
          npm test 2>&1 | tee ../Test\ Results/Logs/selenium-output.log || true

      - name: Generate HTML Report
        run: |
          python3 scripts/generate_test_report.py \
            --log "Test Results/Logs/selenium-output.log" \
            --output "Test Results/HTML/execution-report.html" \
            --base-url "${{ env.BASE_URL }}" || true

      - name: Generate Excel Report
        run: |
          pip install openpyxl
          python3 scripts/generate_test_excel.py \
            --log "Test Results/Logs/selenium-output.log" \
            --output "Test Results/Excel/Automation_Test_Report.xlsx" || true

      - name: Generate Summary
        run: |
          cat > "Test Results/Summary/summary.md" << 'EOF'
          # Live GitHub Pages E2E Test Summary

          **Deployment URL:** https://Viru-6281.github.io/spic-pdd/

          **Test Execution Date:** $(date -u '+%Y-%m-%d %H:%M UTC')

          | Metric | Value |
          |--------|-------|
          | Total Tests | See report |
          | Base URL | https://Viru-6281.github.io/spic-pdd/ |
          | Browser | Chrome (Headless) |
          | Framework | Selenium WebDriver + Mocha |

          ## Test Suites Executed
          - ✅ Homepage Load Test
          - ✅ Navigation Tests
          - ✅ Lender Login Page Test
          - ✅ User Login Page Test
          - ✅ User Registration Page Test
          - ✅ Lender Registration Page Test
          - ✅ Route Navigation Tests
          - ✅ Form Validation Tests
          - ✅ 404 Not Found Handling

          EOF

      - name: Publish E2E Summary
        run: |
          echo "# 🤖 Live E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** https://Viru-6281.github.io/spic-pdd/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "Test Results/Logs/selenium-output.log" ]; then
            PASSING=$(grep -c "passing" "Test Results/Logs/selenium-output.log" || echo "0")
            FAILING=$(grep -c "failing" "Test Results/Logs/selenium-output.log" || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Browser | Chrome Headless |" >> $GITHUB_STEP_SUMMARY
            echo "| Base URL | https://Viru-6281.github.io/spic-pdd/ |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-results
          path: Test Results/
          retention-days: 30

  # ══════════════════════════════════════════
  # JOB 5: Publish Reports to GitHub Pages
  # ══════════════════════════════════════════
  publish-reports:
    name: 📊 Publish Test Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: selenium-e2e
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-content

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: selenium-test-results
          path: downloaded-results

      - name: Organize reports for GitHub Pages
        run: |
          BUILD_NUM=${{ github.run_number }}
          mkdir -p gh-pages-content/reports/latest
          mkdir -p gh-pages-content/reports/history/build-$(printf '%03d' $BUILD_NUM)

          cp -r downloaded-results/HTML/* gh-pages-content/reports/latest/ 2>/dev/null || true
          cp -r downloaded-results/Screenshots/* gh-pages-content/reports/latest/screenshots/ 2>/dev/null || true
          cp -r downloaded-results/Logs/* gh-pages-content/reports/latest/logs/ 2>/dev/null || true
          cp -r downloaded-results/* gh-pages-content/reports/history/build-$(printf '%03d' $BUILD_NUM)/ 2>/dev/null || true

      - name: Push reports to gh-pages
        working-directory: gh-pages-content
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "📊 Test reports — Build #${{ github.run_number }}" || echo "Nothing to commit"
          git push || echo "Push failed — gh-pages may not exist yet"
