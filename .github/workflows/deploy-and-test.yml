name: 🚀 Deploy to GitHub Pages + Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  GITHUB_PAGES_URL: https://viru-6281.github.io/pdd-main/

jobs:
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build React App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci --prefer-offline || npm install

      - name: Patch vite.config.js for GitHub Pages
        working-directory: client
        run: |
          cat > vite.config.js << 'VITE_EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          export default defineConfig({
            plugins: [react()],
            base: '/pdd-main/',
          })
          VITE_EOF

      - name: Build React application
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:8080' }}
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  # ─────────────────────────────────────────
  deploy:
    name: 📤 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      live_url: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Wait for pages to propagate
        run: sleep 30

      - name: Verify HTTP 200
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          echo "Verifying: $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 15)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "✅ Deployment live!"; exit 0; }
            sleep 20
          done
          echo "❌ Deployment not reachable — continuing anyway"

  # ─────────────────────────────────────────
  selenium-e2e:
    name: 🧪 Selenium E2E Tests (Live GitHub Pages)
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    env:
      BASE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          pip install \
            selenium==4.21.0 \
            pytest==8.2.2 \
            pytest-html==4.1.1 \
            pytest-timeout==2.3.1 \
            openpyxl==3.1.5 \
            webdriver-manager==4.0.2

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome version
        run: google-chrome --version

      - name: Create output directories
        run: |
          mkdir -p "Test Results/Screenshots"
          mkdir -p "Test Results/Logs"
          mkdir -p "Test Results/HTML"
          mkdir -p "Test Results/Excel"
          mkdir -p "Test Results/Summary"

      - name: Run all Selenium E2E tests
        run: |
          python -m pytest \
            selenium-tests/tests/test_e2e.py \
            -v \
            --timeout=60 \
            --tb=short \
            --html="Test Results/HTML/execution-report.html" \
            --self-contained-html \
            -o log_file="Test Results/Logs/pytest.log" \
            --junit-xml="Test Results/Logs/junit-results.xml"
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
        continue-on-error: true

      - name: Generate Excel test report
        run: |
          python scripts/generate_test_report.py
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
        continue-on-error: true

      - name: Generate summary.md
        run: |
          PASSED=$(grep -c "PASSED" "Test Results/Logs/pytest.log" 2>/dev/null || echo "0")
          FAILED=$(grep -c "FAILED" "Test Results/Logs/pytest.log" 2>/dev/null || echo "0")
          TOTAL=$((PASSED + FAILED))
          PCT=$([ "$TOTAL" -gt 0 ] && echo "scale=1; $PASSED * 100 / $TOTAL" | bc || echo "0")

          cat > "Test Results/Summary/summary.md" << EOF
          # Live GitHub Pages E2E Test Summary

          **Deployment URL:** ${{ needs.deploy.outputs.page_url }}
          **Run Date:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}

          ## Results

          | Metric | Value |
          |---|---|
          | Total Tests | $TOTAL |
          | Passed | ✅ $PASSED |
          | Failed | ❌ $FAILED |
          | Pass Rate | $PCT% |

          ## Reports
          - [HTML Report](../HTML/execution-report.html)
          - [Excel Report](../Excel/Automation_Test_Report.xlsx)
          EOF

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-results
          path: Test Results/
          retention-days: 30

      - name: Publish E2E Summary
        if: always()
        run: |
          PASSED=$(grep -c "PASSED" "Test Results/Logs/pytest.log" 2>/dev/null || echo "N/A")
          FAILED=$(grep -c "FAILED" "Test Results/Logs/pytest.log" 2>/dev/null || echo "N/A")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🧪 Live GitHub Pages E2E Test Summary

          **Deployment URL:** ${{ needs.deploy.outputs.page_url }}
          **Run Date:** $(date -u '+%Y-%m-%d %H:%M UTC')

          | | Result |
          |---|---|
          | Total Tests | 16 |
          | Passed | ✅ $PASSED |
          | Failed | ❌ $FAILED |

          📥 Download full reports from **Artifacts → selenium-e2e-results**
          EOF

  # ─────────────────────────────────────────
  publish-reports:
    name: 📊 Publish Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [deploy, selenium-e2e]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: selenium-e2e-results
          path: downloaded-results
        continue-on-error: true

      - name: Publish to gh-pages/reports
        run: |
          BUILD="${{ github.run_number }}"
          mkdir -p gh-pages/reports/latest
          mkdir -p "gh-pages/reports/history/build-$(printf '%03d' $BUILD)"

          cp -r downloaded-results/HTML/. gh-pages/reports/latest/ 2>/dev/null || true
          cp -r downloaded-results/Screenshots/. gh-pages/reports/latest/screenshots/ 2>/dev/null || true
          cp -r downloaded-results/Summary/. gh-pages/reports/latest/ 2>/dev/null || true
          cp -r downloaded-results/HTML/. "gh-pages/reports/history/build-$(printf '%03d' $BUILD)/" 2>/dev/null || true

          cd gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet \
            || git commit -m "📊 Test reports — Build #$BUILD"
          git push origin gh-pages
        continue-on-error: true
